<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=420, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 420px;
      height: 500px;
      overflow: hidden;
      background: transparent;
      font-family: "Leelawadee UI", Tahoma, Arial, sans-serif;
    }
    .card {
      width: 420px;
      height: 500px;
      padding: 28px 32px 24px;
      border-radius: 28px;
      background: #ffffff;
      border: 4px solid #f7bd4f;
      color: #07111f;
      box-shadow: 0 16px 40px rgba(0,0,0,.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .chip {
      height: 34px;
      padding: 0 16px;
      border-radius: 999px;
      background: #06384d;
      color: #32d8ff;
      font-size: 16px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    img {
      display: block;
      width: 292px;
      height: 292px;
      margin-top: 22px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .scan {
      margin-top: 22px;
      font-size: 29px;
      line-height: 1.2;
      font-weight: 850;
    }
    .url {
      margin-top: 8px;
      color: #596674;
      font-size: 17px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="chip">BYBIT BONUSOK</div>
    <img src="qr-code-BONUSOK.png" alt="Bybit bonusok QR">
    <div class="scan">สแกนเพื่อเปิด</div>
    <div class="url">partner.bybit.com/b/bonusok</div>
  </section>
</body>
</html>
