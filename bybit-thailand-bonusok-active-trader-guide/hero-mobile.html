<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bybit Thai Mobile Hero</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 900px;
      height: 1050px;
      overflow: hidden;
      background: #020814;
      font-family: "Leelawadee UI", Tahoma, Arial, sans-serif;
    }
    .stage {
      position: relative;
      width: 900px;
      height: 1050px;
      color: #f7fbff;
      background:
        linear-gradient(180deg, rgba(2,8,20,.98) 0%, rgba(2,8,20,.84) 48%, rgba(2,8,20,.48) 100%),
        linear-gradient(90deg, rgba(2,8,20,.98) 0%, rgba(2,8,20,.74) 54%, rgba(2,8,20,.18) 100%),
        url("background.png") center / cover no-repeat;
    }
    .copy {
      position: absolute;
      left: 58px;
      top: 62px;
      width: 760px;
    }
    .chip {
      display: inline-flex;
      height: 48px;
      align-items: center;
      padding: 0 22px;
      border: 2px solid #24d1ff;
      border-radius: 999px;
      background: rgba(4, 51, 71, .84);
      color: #34dcff;
      font-size: 22px;
      font-weight: 850;
    }
    h1 {
      margin: 92px 0 22px;
      font-size: 78px;
      line-height: 1.08;
      font-weight: 850;
      letter-spacing: 0;
    }
    .sub {
      margin: 0;
      color: #d2e0ec;
      font-size: 32px;
      line-height: 1.34;
      font-weight: 700;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 54px;
      width: 720px;
    }
    .tag {
      padding: 13px 18px 14px;
      border: 1.5px solid #42d4ff;
      border-radius: 16px;
      background: rgba(4,55,77,.9);
      color: #f7fbff;
      font-size: 24px;
      font-weight: 850;
    }
    .warning {
      position: absolute;
      left: 58px;
      bottom: 58px;
      width: 760px;
      padding: 30px 34px 28px;
      border-radius: 24px;
      background: rgba(255,255,255,.98);
      color: #07111f;
      box-shadow: 0 18px 50px rgba(0,0,0,.32);
    }
    .big {
      font-size: 50px;
      line-height: 1.16;
      font-weight: 850;
    }
    .small {
      margin-top: 10px;
      color: #4e5a67;
      font-size: 25px;
      line-height: 1.35;
      font-weight: 650;
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="copy">
      <div class="chip">BYBIT BONUSOK</div>
      <h1>คู่มือ Bybit<br>สำหรับเทรดเดอร์ไทย</h1>
      <p class="sub">AI Subaccount • XAUT Gold<br>API execution และ Thai SEC check</p>
      <div class="tags">
        <div class="tag">Thai SEC check</div>
        <div class="tag">AI risk sandbox</div>
        <div class="tag">XAUT options</div>
      </div>
    </section>
    <section class="warning">
      <div class="big">โค้ด: bonusok</div>
      <div class="small">ใช้เฉพาะเมื่อคุณมีสิทธิ์ตามกฎหมาย, KYC, ภูมิภาค และกฎของ Bybit เท่านั้น</div>
    </section>
  </main>
</body>
</html>
