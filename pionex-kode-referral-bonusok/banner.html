<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pionex BONUSOK Indonesia Banner</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1600px;
      height: 900px;
      overflow: hidden;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: #f7fbf9;
    }
    .canvas {
      position: relative;
      width: 1600px;
      height: 900px;
      overflow: hidden;
      background:
        radial-gradient(circle at 68% 40%, rgba(16, 185, 129, .14), transparent 28%),
        radial-gradient(circle at 18% 86%, rgba(255, 111, 0, .18), transparent 26%),
        linear-gradient(135deg, #fbfefd 0%, #eef7f2 52%, #fff7ef 100%);
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(15, 23, 42, .055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, .055) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 78%, transparent 100%);
      opacity: .55;
    }
    .orange-wave {
      position: absolute;
      left: -100px;
      right: -110px;
      bottom: 115px;
      height: 190px;
      background:
        linear-gradient(100deg, transparent 0 8%, rgba(255, 108, 18, .9) 8% 27%, transparent 27% 39%, rgba(255, 171, 89, .72) 39% 50%, transparent 50% 100%);
      transform: skewY(-8deg);
      filter: blur(.15px);
      opacity: .9;
    }
    .batik {
      position: absolute;
      left: 92px;
      bottom: 40px;
      width: 620px;
      height: 140px;
      background:
        repeating-linear-gradient(135deg, rgba(255, 107, 0, .18) 0 12px, transparent 12px 24px),
        repeating-linear-gradient(45deg, rgba(16, 185, 129, .13) 0 10px, transparent 10px 22px);
      border-radius: 40px;
      transform: rotate(-5deg);
      opacity: .75;
    }
    .jakarta {
      position: absolute;
      left: 32px;
      bottom: 198px;
      width: 560px;
      height: 180px;
      opacity: .28;
      background:
        linear-gradient(to top, rgba(15,23,42,.42), rgba(15,23,42,.1)),
        linear-gradient(90deg, transparent 0 8%, #334155 8% 11%, transparent 11% 14%, #334155 14% 18%, transparent 18% 21%, #334155 21% 24%, transparent 24% 30%, #334155 30% 35%, transparent 35% 42%, #334155 42% 45%, transparent 45% 50%, #334155 50% 55%, transparent 55%);
      clip-path: polygon(0 80%, 6% 76%, 8% 50%, 11% 50%, 11% 77%, 15% 72%, 15% 38%, 18% 38%, 18% 76%, 23% 70%, 23% 30%, 26% 30%, 26% 76%, 31% 72%, 33% 10%, 36% 72%, 43% 69%, 45% 44%, 48% 44%, 48% 75%, 55% 70%, 57% 26%, 61% 70%, 68% 76%, 71% 52%, 74% 52%, 74% 79%, 88% 77%, 100% 84%, 100% 100%, 0 100%);
    }
    .device-main {
      position: absolute;
      left: 495px;
      top: 105px;
      width: 560px;
      height: 610px;
      border-radius: 32px;
      transform: perspective(900px) rotateY(-9deg) rotateX(3deg);
      background: linear-gradient(145deg, #172033, #0b1220);
      box-shadow: 0 36px 80px rgba(15, 23, 42, .28);
      border: 2px solid rgba(255,255,255,.12);
      padding: 28px;
    }
    .screen-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      height: 100%;
    }
    .tile {
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,.035));
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      position: relative;
      overflow: hidden;
    }
    .tile.chart::before {
      content: "";
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 46px;
      height: 150px;
      background: linear-gradient(140deg, transparent 0 18%, #16c784 18% 20%, transparent 20% 36%, #16c784 36% 38%, transparent 38% 57%, #f97316 57% 59%, transparent 59% 76%, #16c784 76% 78%, transparent 78%);
      filter: drop-shadow(0 0 10px rgba(22,199,132,.35));
    }
    .tile.chart::after {
      content: "";
      position: absolute;
      left: 30px;
      right: 30px;
      bottom: 34px;
      height: 2px;
      background: rgba(148, 163, 184, .25);
      box-shadow: 0 -38px 0 rgba(148, 163, 184, .12), 0 -76px 0 rgba(148, 163, 184, .12), 0 -114px 0 rgba(148, 163, 184, .12);
    }
    .tile.bot {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 34px 28px;
      align-content: center;
    }
    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 12px rgba(16, 185, 129, .45);
    }
    .dot:nth-child(3n) { background: #f97316; box-shadow: 0 0 12px rgba(249, 115, 22, .45); }
    .dot:nth-child(5n) { opacity: .55; }
    .tile.pie::before {
      content: "";
      position: absolute;
      width: 116px;
      height: 116px;
      left: 50%;
      top: 42px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: conic-gradient(#f97316 0 42%, #10b981 42% 70%, #ffe08a 70% 100%);
      box-shadow: 0 0 22px rgba(249, 115, 22, .24);
    }
    .tile.pie::after, .tile.card::after {
      content: "";
      position: absolute;
      left: 30px;
      right: 30px;
      bottom: 34px;
      height: 10px;
      border-radius: 999px;
      background: rgba(148,163,184,.35);
      box-shadow: 0 -28px 0 rgba(148,163,184,.3), 0 -56px 0 rgba(148,163,184,.25);
    }
    .tile.card::before {
      content: "";
      position: absolute;
      width: 96px;
      height: 96px;
      left: 50%;
      top: 48px;
      transform: translateX(-50%) rotate(45deg);
      border-radius: 14px;
      background: linear-gradient(145deg, #34d399, #0f766e);
      box-shadow: 0 18px 34px rgba(16, 185, 129, .28);
    }
    .phone {
      position: absolute;
      left: 292px;
      top: 255px;
      width: 285px;
      height: 500px;
      border-radius: 38px;
      background: linear-gradient(145deg, #182135, #080e18);
      border: 10px solid #111827;
      transform: rotate(-8deg);
      box-shadow: 0 34px 70px rgba(15, 23, 42, .34);
      overflow: hidden;
    }
    .phone::before {
      content: "";
      position: absolute;
      left: 42px;
      right: 42px;
      top: 62px;
      height: 136px;
      background:
        linear-gradient(135deg, transparent 0 14%, #ff6b00 14% 16%, transparent 16% 32%, #16c784 32% 34%, transparent 34% 52%, #ff6b00 52% 54%, transparent 54% 70%, #16c784 70% 72%, transparent 72%),
        linear-gradient(to bottom, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border-radius: 18px;
    }
    .phone::after {
      content: "";
      position: absolute;
      left: 42px;
      right: 42px;
      bottom: 58px;
      height: 60px;
      border-radius: 16px;
      background: linear-gradient(90deg, #f97316, #10b981);
    }
    .coin {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 25%, #e8fff6, #10b981 58%, #087f5b);
      box-shadow: 0 18px 28px rgba(16,185,129,.24);
      border: 4px solid rgba(255,255,255,.7);
    }
    .coin::after {
      content: "T";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 36px;
      color: rgba(255,255,255,.86);
    }
    .coin.one { left: 655px; bottom: 82px; transform: rotate(-8deg); }
    .coin.two { left: 760px; bottom: 122px; width: 54px; height: 54px; }
    .coin.two::after { font-size: 28px; }
    .title-panel {
      position: absolute;
      left: 72px;
      top: 68px;
      width: 690px;
      height: 318px;
      border-radius: 32px;
      padding: 34px 38px;
      background: rgba(255,255,255,.9);
      border: 1px solid rgba(249,115,22,.38);
      box-shadow: 0 24px 60px rgba(15, 23, 42, .12);
      backdrop-filter: blur(8px);
    }
    .eyebrow {
      font-weight: 900;
      color: #059669;
      letter-spacing: .04em;
      font-size: 28px;
      margin-bottom: 20px;
    }
    .headline {
      font-size: 58px;
      line-height: .98;
      font-weight: 900;
      letter-spacing: 0;
      color: #111827;
      margin: 0 0 23px;
    }
    .subhead {
      font-size: 27px;
      line-height: 1.2;
      color: #f05a16;
      font-weight: 850;
      margin: 0;
    }
    .code-panel {
      position: absolute;
      left: 90px;
      bottom: 110px;
      width: 470px;
      height: 118px;
      border-radius: 22px;
      padding: 20px 28px;
      background: rgba(17, 24, 39, .93);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 22px 44px rgba(15,23,42,.28);
    }
    .code-label {
      font-size: 23px;
      color: #cbd5e1;
      font-weight: 800;
      margin-bottom: 3px;
    }
    .code-value {
      font-size: 47px;
      line-height: 1;
      color: #ff6b00;
      font-weight: 950;
      letter-spacing: 0;
    }
    .qr-card {
      position: absolute;
      left: 1076px;
      top: 146px;
      width: 406px;
      height: 618px;
      border-radius: 28px;
      background: #fff;
      border: 1px solid #d8e1ea;
      box-shadow: 0 28px 70px rgba(15, 23, 42, .20);
      padding: 48px 38px 36px;
      text-align: center;
    }
    .qr-box {
      width: 330px;
      height: 330px;
      margin: 0 auto 42px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: #fff;
      border: 1px solid #dbe4ec;
      padding: 0;
    }
    .qr-box img {
      width: 330px;
      height: 330px;
      object-fit: contain;
      display: block;
    }
    .qr-title {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.12;
      color: #111827;
      margin: 0 0 9px;
    }
    .qr-subtitle {
      font-size: 20px;
      color: #667085;
      font-weight: 650;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="canvas">
    <div class="grid"></div>
    <div class="orange-wave"></div>
    <div class="batik"></div>
    <div class="jakarta"></div>
    <section class="device-main" aria-hidden="true">
      <div class="screen-grid">
        <div class="tile chart"></div>
        <div class="tile pie"></div>
        <div class="tile bot">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>

    <div class="phone" aria-hidden="true"></div>
    <div class="coin one" aria-hidden="true"></div>

    <section class="title-panel">
      <div class="eyebrow">PIONEX BONUSOK GUIDE</div>

    </section>
    <section class="code-panel">
      <div class="code-label">Referral code</div>
      <div class="code-value">BONUSOK</div>
    </section>
    <section class="qr-card">
      <div class="qr-box"><img src="assets/qr-code-BONUSOK-main.png" alt=""></div>
      <p class="qr-title">Scan atau pakai BONUSOK</p>
      <p class="qr-subtitle">Official Pionex signup</p>
    </section>
  </main>
</body>
</html>
